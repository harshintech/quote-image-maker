<!doctype html>
<html>
  <head>
    <title>Reel Generator</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #000;
        color: #fff;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        background: #111;
        border: 1px solid #333;
        border-radius: 12px;
        box-shadow: 0 8px 25px rgba(255, 255, 255, 0.05);
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
        font-size: 24px;
        font-weight: 600;
        color: #fff;
      }

      textarea {
        width: 100%;
        height: 120px;
        padding: 16px;
        border: none;
        outline: none;
        resize: none;
        font-size: 15px;
        border-radius: 10px;
        background: #0a0a0a;
        color: #ffffff;
        transition: background 0.2s;
      }

      textarea:focus {
        background: #080808;
      }

      textarea::placeholder {
        color: #6b7280;
      }

      .buttons {
        margin-top: 20px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #fff;
        color: #000;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        background: #e5e5e5;
      }

      button:active {
        transform: scale(0.98);
      }

      #status {
        margin-top: 16px;
        font-size: 14px;
        color: #bbb;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      @media (max-width: 500px) {
        .container {
          padding: 22px;
        }

        h2 {
          font-size: 22px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Insta Auto</h2>

      <textarea id="quote" placeholder="Write your quote here..."></textarea>

      <div class="buttons">
        <button id="generateBtn" onclick="generate()">Generate Photos</button>
      </div>

      <p id="status"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
